</head>

<body>

<div class="header">
    <h1>📊 AI Trading Dashboard</h1>
    <div class="timer">
        Refresh in: <span id="countdown">120</span>s
    </div>
</div>

<div id="dashboard">Loading...</div>

<script>

const API = "https://tradingz.onrender.com"; // change if needed
const REFRESH_INTERVAL = 120;

let countdown = REFRESH_INTERVAL;

function getSignalClass(signal) {
    return signal.toLowerCase().replace(" ", "-");
}

function safe(v) {
    return (v === null || v === undefined) ? "-" : v;
}

function render(data) {

    const assets = [
        { name: "EUR/USD", key: "EURUSD" },
        { name: "GBP/USD", key: "GBPUSD" },
        { name: "USD/CAD", key: "USDCAD" },
        { name: "GOLD", key: "GOLD" }
    ];

    let html = "";

    for (let a of assets) {

        const d = data[a.key];
        if (!d) continue;

        const signalClass = getSignalClass(d.signal);

        html += `
        <div class="card">

            <h3>${a.name}</h3>

            <div class="signal ${signalClass}">
                ${d.signal}
            </div>

            <div>LONG (${d.long_score})</div>
            <div class="bar">
                <div class="fill-long" style="width:${d.long_score}%"></div>
            </div>

            <div>SHORT (${d.short_score})</div>
            <div class="bar">
                <div class="fill-short" style="width:${d.short_score}%"></div>
            </div>

            <table>
                <tr><td>Entry</td><td>${safe(d.entry)}</td></tr>
                <tr><td>SL</td><td>${safe(d.stop_loss)}</td></tr>
                <tr><td>TP</td><td>${safe(d.take_profit)}</td></tr>
                <tr><td>RSI</td><td>${safe(d.rsi)}</td></tr>
                <tr><td>ATR</td><td>${safe(d.atr)}</td></tr>
            </table>

        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

async function load() {
    try {
        const res = await fetch(`${API}/dashboard/all`);
        const data = await res.json();
        render(data);
        countdown = REFRESH_INTERVAL; // reset timer
    } catch (e) {
        document.getElementById("dashboard").innerHTML =
            "<h3 style='color:red'>Backend unavailable</h3>";
    }
}

// countdown tick every second
setInterval(() => {
    countdown--;
    if (countdown <= 0) {
        load();
    }
    document.getElementById("countdown").innerText = countdown;
}, 1000);

// initial load
load();

</script>

</body>
