<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            width: 60%;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; font-weight: bold; }
        .sell { color: #ef4444; font-weight: bold; }
        .hold { color: #facc15; font-weight: bold; }
    </style>
</head>

<body>

<h1>📊 Trading Dashboard</h1>

<div id="dashboard"></div>

<script>

const API = "https://tradingz.onrender.com";

let lastPrices = {};

function render(data) {

    const assets = [
        { name: "EUR/USD", key: "EURUSD" },
        { name: "GBP/USD", key: "GBPUSD" },
        { name: "USD/JPY", key: "USDJPY" },
        { name: "AUD/USD", key: "AUDUSD" },
        { name: "USD/CAD", key: "USDCAD" },
        { name: "USD/CHF", key: "USDCHF" },
        { name: "NZD/USD", key: "NZDUSD" },
        { name: "GOLD", key: "GOLD" }
    ];

    let html = "";

    for (let a of assets) {

        const d = data[a.key];
        if (!d) continue;

        let price = d.entry;

        let color = "#38bdf8";
        if (lastPrices[a.key]) {
            if (price > lastPrices[a.key]) color = "#22c55e";
            else if (price < lastPrices[a.key]) color = "#ef4444";
        }
        lastPrices[a.key] = price;

        let cls = (d.signal || "").toLowerCase();

        html += `
        <div class="card">
            <h2>${a.name}</h2>

            <table>
                <tr><td>Signal</td><td class="${cls}">${d.signal}</td></tr>
                <tr><td>Live Price</td><td style="color:${color}; font-weight:bold">${price}</td></tr>
                <tr><td>Entry</td><td>${d.entry}</td></tr>
                <tr><td>Stop Loss</td><td>${d.stop_loss ?? "-"}</td></tr>
                <tr><td>Take Profit</td><td>${d.take_profit ?? "-"}</td></tr>
                <tr><td>ATR</td><td>${d.atr}</td></tr>
            </table>
        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

async function load() {
    const res = await fetch(`${API}/dashboard/all`);
    const data = await res.json();
    render(data);
}

load();
setInterval(load, 10000); // 10s refresh (safe)

</script>

</body>
</html>
