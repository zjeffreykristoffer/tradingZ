</head>

<body>

<div class="header">
    <h2>📊 Trading Dashboard</h2>
    Refresh in: <span id="countdown">--</span>s
</div>

<div id="dashboard">Loading...</div>

<script>

const API = "https://tradingz.onrender.com";
const REFRESH_INTERVAL = 120;

let serverTime = 0;

function safe(v){
    return v ?? "-";
}

function render(data){
    let html = "";

    for (let key in data){
        let d = data[key];

        html += `
        <div class="card">
            <h3>${key}</h3>
            <p><b>${d.signal}</b></p>
            <p>Entry: ${safe(d.entry)}</p>
            <p>SL: ${safe(d.stop_loss)}</p>
            <p>TP: ${safe(d.take_profit)}</p>
            <p>RSI: ${safe(d.rsi)}</p>
            <p>ATR: ${safe(d.atr)}</p>
        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

async function load(){
    const res = await fetch(`${API}/dashboard/all`);
    const data = await res.json();

    render(data);

    const first = Object.values(data)[0];
    serverTime = first.timestamp;
}

function updateCountdown(){
    if (!serverTime) return;

    const now = Math.floor(Date.now() / 1000);
    const elapsed = now - serverTime;
    const remaining = REFRESH_INTERVAL - elapsed;

    document.getElementById("countdown").innerText =
        remaining > 0 ? remaining : 0;

    if (remaining <= 0){
        load();
    }
}

setInterval(updateCountdown, 1000);

load();

</script>

</body>
</html>
