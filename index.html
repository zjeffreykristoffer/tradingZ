<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            width: 60%;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; font-weight: bold; }
        .sell { color: #ef4444; font-weight: bold; }
        .hold { color: #facc15; font-weight: bold; }
    </style>
</head>

<body>

<h1>📊 Live Trading Dashboard</h1>

<div id="dashboard"></div>

<script>

const ws = new WebSocket("wss://tradingz.onrender.com/ws");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    render(data);
};

function render(data) {

    const assets = [
        { name: "EUR/USD", key: "EURUSD" },
        { name: "GOLD", key: "GOLD" }
    ];

    let html = "";

    for (let a of assets) {

        const d = data[a.key];
        if (!d) continue;

        html += `
        <div class="card">
            <h2>${a.name}</h2>

            <table>
                <tr><td>Signal</td><td class="${d.signal.toLowerCase()}">${d.signal}</td></tr>
                <tr><td>Entry</td><td>${d.entry}</td></tr>
                <tr><td>Stop Loss</td><td>${d.stop_loss ?? "-"}</td></tr>
                <tr><td>Take Profit</td><td>${d.take_profit ?? "-"}</td></tr>
                <tr><td>ATR</td><td>${d.atr}</td></tr>
            </table>
        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

</script>

</body>
</html>
