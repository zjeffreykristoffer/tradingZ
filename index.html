<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            width: 60%;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; font-weight: bold; }
        .sell { color: #ef4444; font-weight: bold; }
        .hold { color: #facc15; font-weight: bold; }
    </style>
</head>

<body>

<h1>📊 Multi-Asset Trading Dashboard</h1>

<div id="dashboard"></div>

<script>

const API = "https://tradingz.onrender.com";

async function loadAll() {

    const pairs = [
        { name: "EUR/USD", symbol: "EUR/USD" },
        { name: "GOLD", symbol: "XAU/USD" }
    ];

    let html = "";

    for (let p of pairs) {

        const res = await fetch(`${API}/dashboard/${p.symbol}`);
        const data = await res.json();

        if (data.error) continue;

        let cls = (data.signal || "").toLowerCase();

        html += `
        <div class="card">
            <h2>${p.name}</h2>

            <table>
                <tr><td>Signal</td><td class="${cls}">${data.signal}</td></tr>
                <tr><td>Entry</td><td>${data.entry}</td></tr>
                <tr><td>Stop Loss</td><td>${data.stop_loss ?? "-"}</td></tr>
                <tr><td>Take Profit</td><td>${data.take_profit ?? "-"}</td></tr>
                <tr><td>ATR</td><td>${data.atr}</td></tr>
            </table>
        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

loadAll();
setInterval(loadAll, 60000);

</script>

</body>
</html>
