<!DOCTYPE html>
<html>
<head>
<title>AI Trading Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.header {
    position: sticky;
    top: 0;
    background: #020617;
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

.timer {
    font-size: 14px;
    color: #94a3b8;
}

#dashboard {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
}

.signal {
    font-weight: bold;
}

.strong-buy { color: #22c55e; }
.buy { color: #4ade80; }
.weak-buy { color: #facc15; }
.sell { color: #f87171; }
.strong-sell { color: #ef4444; }
.no-trade { color: #94a3b8; }

.bar {
    height: 8px;
    background: #334155;
    border-radius: 5px;
}

.fill-long { background: #22c55e; height: 100%; }
.fill-short { background: #ef4444; height: 100%; }

table {
    width: 100%;
    margin-top: 8px;
    font-size: 12px;
}

td {
    padding: 4px;
    border-bottom: 1px solid #334155;
}
</style>

</head>

<body>

<div class="header">
    <h2>📊 AI Trading Dashboard</h2>
    <div class="timer">Refresh: <span id="countdown">120</span>s</div>
</div>

<div id="dashboard">Loading...</div>

<script>

const API = "https://tradingz.onrender.com";
let countdown = 120;

// ======================
// SAFE VALUE HANDLER
// ======================
function safe(v){
    return (v === null || v === undefined) ? "-" : v;
}

// ======================
function getSignalClass(s){
    if(!s) return "no-trade";
    return s.toLowerCase().replace(/\s+/g,"-");
}

// ======================
// FIXED ASSET LIST (6 PAIRS)
// ======================
const assets = [
    {name:"EUR/USD", key:"EURUSD"},
    {name:"GBP/USD", key:"GBPUSD"},
    {name:"USD/CAD", key:"USDCAD"},
    {name:"GOLD", key:"GOLD"},
    {name:"BRENT OIL", key:"UK OIL"},
    {name:"WTI OIL", key:"US OIL"}
];

// ======================
// RENDER
// ======================
function render(data){

let html = "";

for(let a of assets){

    const d = data[a.key] || {
        signal:"NO DATA",
        long_score:0,
        short_score:0
    };

    html += `
    <div class="card">

        <h3>${a.name}</h3>

        <div class="signal ${getSignalClass(d.signal)}">
            ${d.signal}
        </div>

        <div>LONG ${safe(d.long_score)}</div>
        <div class="bar">
            <div class="fill-long" style="width:${safe(d.long_score)}%"></div>
        </div>

        <div>SHORT ${safe(d.short_score)}</div>
        <div class="bar">
            <div class="fill-short" style="width:${safe(d.short_score)}%"></div>
        </div>

        <table>
            <tr><td>Entry</td><td>${safe(d.entry)}</td></tr>
            <tr><td>SL</td><td>${safe(d.stop_loss)}</td></tr>
            <tr><td>TP</td><td>${safe(d.take_profit)}</td></tr>

            <tr><td>Lot Size</td><td style="color:#38bdf8">${safe(d.lot_size)}</td></tr>
            <tr><td>Risk $</td><td style="color:#fbbf24">${safe(d.risk_per_trade_usd)}</td></tr>

            <tr><td>RSI</td><td>${safe(d.rsi)}</td></tr>
            <tr><td>ATR</td><td>${safe(d.atr)}</td></tr>
        </table>

    </div>
    `;
}

document.getElementById("dashboard").innerHTML = html;
}

// ======================
// LOAD DATA
// ======================
async function load(){
    try{
        const res = await fetch(API + "/dashboard/all");
        const data = await res.json();
        render(data);
        countdown = 120;
    }catch(e){
        document.getElementById("dashboard").innerHTML =
            "<h3 style='color:red'>API Error</h3>";
    }
}

// ======================
// TIMER
// ======================
setInterval(() => {
    countdown--;
    document.getElementById("countdown").innerText = countdown;

    if(countdown <= 0){
        load();
    }
}, 1000);

// initial load
load();

</script>

</body>
</html>
