<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            width: 60%;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; }
        .sell { color: #ef4444; }
        .hold { color: #facc15; }
    </style>
</head>

<body>

<h1>📊 Trading Dashboard</h1>

<div class="card">
    <h2>Signal</h2>
    <table id="table"></table>
</div>

<div class="card">
    <h2>Chart</h2>
    <canvas id="chart"></canvas>
</div>

<script>
let chart;

async function load() {
    const res = await fetch("http://127.0.0.1:8000/dashboard/forex");
    const data = await res.json();

    let cls = data.signal.toLowerCase();

    document.getElementById("table").innerHTML = `
        <tr><td>Symbol</td><td>${data.symbol}</td></tr>
        <tr><td>Signal</td><td class="${cls}">${data.signal}</td></tr>
        <tr><td>Entry</td><td>${data.entry}</td></tr>
        <tr><td>SL</td><td>${data.stop_loss ?? "-"}</td></tr>
        <tr><td>TP</td><td>${data.take_profit ?? "-"}</td></tr>
        <tr><td>ATR</td><td>${data.atr}</td></tr>
    `;

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: data.prices.map((_, i) => i),
            datasets: [
                {
                    label: "Price",
                    data: data.prices,
                    borderColor: "#38bdf8"
                },
                {
                    label: "EMA10",
                    data: data.ema10,
                    borderColor: "#22c55e"
                },
                {
                    label: "EMA20",
                    data: data.ema20,
                    borderColor: "#ef4444"
                }
            ]
        }
    });
}

load();
setInterval(load, 60000); // 60 seconds
</script>

</body>
</html>
