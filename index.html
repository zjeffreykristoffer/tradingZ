</head>

<body>

<h1>📊 AI Trading Dashboard</h1>

<div id="dashboard">Loading...</div>

<script>

const API = "https://tradingz.onrender.com"; // CHANGE if needed

function getSignalClass(signal) {
    return signal.toLowerCase().replace(" ", "-");
}

function safe(v) {
    return (v === null || v === undefined) ? "-" : v;
}

function render(data) {

    const assets = [
        { name: "EUR/USD", key: "EURUSD" },
        { name: "GBP/USD", key: "GBPUSD" },
        { name: "USD/CAD", key: "USDCAD" },
        { name: "GOLD", key: "GOLD" }
    ];

    let html = "";

    for (let a of assets) {

        const d = data[a.key];

        if (!d) continue;

        const signalClass = getSignalClass(d.signal);

        const longWidth = Math.min(d.long_score, 100);
        const shortWidth = Math.min(d.short_score, 100);

        html += `
        <div class="card">

            <h2>${a.name}</h2>

            <div class="signal ${signalClass}">
                ${d.signal}
            </div>

            <!-- SCORE BARS -->
            <div>LONG SCORE (${d.long_score})</div>
            <div class="bar">
                <div class="fill-long" style="width:${longWidth}%"></div>
            </div>

            <div>SHORT SCORE (${d.short_score})</div>
            <div class="bar">
                <div class="fill-short" style="width:${shortWidth}%"></div>
            </div>

            <table>
                <tr><td>Entry</td><td>${safe(d.entry)}</td></tr>
                <tr><td>Stop Loss</td><td>${safe(d.stop_loss)}</td></tr>
                <tr><td>Take Profit</td><td>${safe(d.take_profit)}</td></tr>
                <tr><td>RSI</td><td>${safe(d.rsi)}</td></tr>
                <tr><td>ATR</td><td>${safe(d.atr)}</td></tr>
                <tr><td>EMA50</td><td>${safe(d.ema50)}</td></tr>
                <tr><td>EMA200</td><td>${safe(d.ema200)}</td></tr>
            </table>

        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

async function load() {
    try {
        const res = await fetch(`${API}/dashboard/all`);
        const data = await res.json();
        render(data);
    } catch (e) {
        document.getElementById("dashboard").innerHTML =
            "<h3 style='color:red'>Backend unavailable</h3>";
    }
}

load();
setInterval(load, 120000);

</script>

</body>
</html>
