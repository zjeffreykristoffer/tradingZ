<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            width: 60%;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; font-weight: bold; }
        .sell { color: #ef4444; font-weight: bold; }
        .hold { color: #facc15; font-weight: bold; }
        .nodata { color: #94a3b8; }
    </style>
</head>

<body>

<h1>📊 Trading Dashboard</h1>

<div id="dashboard">Loading...</div>

<script>

const API = "https://tradingz.onrender.com";

function safe(val) {
    return val ?? "-";
}

function render(data) {

    if (!data) {
        document.getElementById("dashboard").innerHTML =
            "<h3 class='nodata'>No data from server</h3>";
        return;
    }

    const assets = [
        { name: "EUR/USD", key: "EURUSD" },
        { name: "GOLD", key: "GOLD" }
    ];

    let html = "";

    for (let a of assets) {

        const d = data[a.key];

        if (!d) continue;

        let cls = (d.signal || "").toLowerCase();

        html += `
        <div class="card">
            <h2>${a.name}</h2>

            <table>
                <tr><td>Signal</td><td class="${cls}">${safe(d.signal)}</td></tr>
                <tr><td>Entry</td><td>${safe(d.entry)}</td></tr>
                <tr><td>Stop Loss</td><td>${safe(d.stop_loss)}</td></tr>
                <tr><td>Take Profit</td><td>${safe(d.take_profit)}</td></tr>
                <tr><td>ATR</td><td>${safe(d.atr)}</td></tr>
            </table>
        </div>
        `;
    }

    document.getElementById("dashboard").innerHTML = html;
}

async function load() {

    try {
        const res = await fetch(`${API}/dashboard/all`);
        const data = await res.json();

        console.log("DATA:", data);

        render(data);

    } catch (err) {
        console.error("Fetch error:", err);

        document.getElementById("dashboard").innerHTML =
            "<h3 style='color:red'>Backend unavailable</h3>";
    }
}

// initial load
load();

// refresh every 2 minutes (your new setup)
setInterval(load, 120000);

</script>

</body>
</html>
